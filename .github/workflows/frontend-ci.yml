name: Frontend CI

on: push

jobs:
  test:
    name: Run frontend tests
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
      with:
        lfs: true

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '24.x'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install dependencies
      working-directory: frontend
      run: npm ci

    - name: Run tests
      working-directory: frontend
      run: npm test

  lint:
    name: Lint frontend code
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
      with:
        lfs: true

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '24.x'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install dependencies
      working-directory: frontend
      run: npm ci

    - name: Run ESLint
      working-directory: frontend
      run: npm run lint

  type-check:
    name: TypeScript type checking
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
      with:
        lfs: true

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '24.x'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install dependencies
      working-directory: frontend
      run: npm ci

    - name: Run TypeScript type check
      working-directory: frontend
      run: npm run type-check

  build:
    name: Verify production build
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
      with:
        lfs: true

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '24.x'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install dependencies
      working-directory: frontend
      run: npm ci

    - name: Build production bundle
      working-directory: frontend
      run: npm run build:prod
